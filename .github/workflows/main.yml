name: main

on:
  pull_request:
  push:
    branches: [ "main" ]
permissions:
  contents: read
  checks: write
  pull-requests: write
jobs:
  test:
    uses: ./.github/workflows/setup-test.yml
    secrets:
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PROXY_SERVERS: ${{ secrets.PROXY_SERVERS }}
  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{secrets.DOCKERHUB_USERNAME}}/av-summarizer-py:latest

      - name: Delete untagged Docker Hub images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_REPOSITORY: av-summarizer-py
        run: |
          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.parse
          import urllib.request
          import urllib.error

          base_url = "https://hub.docker.com"
          namespace = os.environ["DOCKERHUB_USERNAME"]
          repository = os.environ["DOCKERHUB_REPOSITORY"]
          token_secret = os.environ["DOCKERHUB_TOKEN"]
          active_from = "1970-01-01T00:00:00Z"

          def request(method, path, *, token=None, body=None, query=None):
              url = f"{base_url}{path}"
              if query:
                  url = f"{url}?{urllib.parse.urlencode(query)}"
              data = None
              headers = {"Accept": "application/json"}
              if body is not None:
                  data = json.dumps(body).encode("utf-8")
                  headers["Content-Type"] = "application/json"
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=60) as response:
                      payload = response.read().decode("utf-8")
                      return json.loads(payload) if payload else {}
              except urllib.error.HTTPError as error:
                  payload = error.read().decode("utf-8")
                  raise RuntimeError(f"{method} {url} failed with {error.code}: {payload}") from error

          auth = request(
              "POST",
              "/v2/auth/token",
              body={"identifier": namespace, "secret": token_secret},
          )
          token = auth["access_token"]

          manifests = []
          page = 1
          while True:
              images = request(
                  "GET",
                  f"/v2/namespaces/{namespace}/repositories/{repository}/images",
                  token=token,
                  query={
                      "status": "active",
                      "currently_tagged": "false",
                      "active_from": active_from,
                      "page": page,
                      "page_size": 100,
                  },
              )
              for image in images.get("results", []):
                  digest = image.get("digest")
                  if digest:
                      manifests.append({"repository": repository, "digest": digest})
              if not images.get("next"):
                  break
              page += 1

          if not manifests:
              print("No untagged Docker Hub images to delete.")
              sys.exit(0)

          delete_body = {
              "dry_run": True,
              "active_from": active_from,
              "manifests": manifests,
              "ignore_warnings": [],
          }
          preview = request("POST", f"/v2/namespaces/{namespace}/delete-images", token=token, body=delete_body)
          warnings = preview.get("warnings", [])
          errors = preview.get("errors", [])

          if errors:
              print(json.dumps(errors, indent=2), file=sys.stderr)
              raise SystemExit("Docker Hub refused image deletion.")

          def warning_name(warning):
              if isinstance(warning, dict):
                  return str(warning.get("warning") or warning.get("code") or "")
              return str(warning)

          def warning_tags(warning):
              if isinstance(warning, dict):
                  tags = warning.get("tags") or []
                  return tags if isinstance(tags, list) else []
              return []

          current_tag_warnings = [
              warning for warning in warnings
              if warning_name(warning) == "current_tag" or "latest" in warning_tags(warning)
          ]
          if current_tag_warnings:
              print(json.dumps(current_tag_warnings, indent=2), file=sys.stderr)
              raise SystemExit("Refusing to delete a manifest that is still tagged.")

          delete_body["dry_run"] = False
          delete_body["ignore_warnings"] = warnings
          result = request("POST", f"/v2/namespaces/{namespace}/delete-images", token=token, body=delete_body)
          print(f"Requested deletion for {len(manifests)} untagged Docker Hub image manifests.")
          print(json.dumps(result, indent=2))
          PY
