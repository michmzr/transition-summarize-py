name: Setup and Test

on:
  workflow_call:
    secrets:
      JWT_SECRET_KEY:
        required: true
      OPENAI_API_KEY:
        required: true
      PROXY_SERVERS:
        required: true

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  setup_and_test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pipenv
        run: |
          python -m pip install --upgrade pip
          pip install pipenv

      - name: Cache pipenv virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.local/share/virtualenvs
          key: ${{ runner.os }}-pipenv-${{ hashFiles('**/Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pipenv-

      - name: Install dependencies and run tests
        id: test-run
        run: |
          echo "Installing dependencies..."
          pipenv --python ${{ env.pythonLocation }}/bin/python install
          pipenv install pytest-asyncio pytest-cov pytest-html pytest-sugar

          echo "Running tests..."
          PYTHONPATH=$PWD pipenv run pytest \
            --verbose -v \
            --junitxml=pytest-results.xml \
            --cov=app \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml
          
          echo "Test files generated:"
          ls -la pytest-results.xml || echo "pytest-results.xml not found"
          ls -la coverage.xml || echo "coverage.xml not found"
          
          echo "Content of pytest-results.xml:"
          cat pytest-results.xml || echo "Cannot read pytest-results.xml"
          
          echo "Content of coverage.xml:"
          cat coverage.xml || echo "Cannot read coverage.xml"
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: test_db
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROXY_SERVERS: ${{ secrets.PROXY_SERVERS }}
          SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          IS_LOCAL: true
          ENABLE_REGISTRATION: true
          LANGCHAIN_TRACING_V2: false
          LANGCHAIN_ENDPOINT: ""
          LANGCHAIN_PROJECT: ""
          LANGCHAIN_API_KEY: ""

      - name: Process Test Results
        if: always()
        id: test-results
        run: |
          echo "Starting test results processing..."
          
          # Initialize default values
          echo "tests=0" >> $GITHUB_OUTPUT
          echo "failures=0" >> $GITHUB_OUTPUT
          echo "errors=0" >> $GITHUB_OUTPUT
          echo "skipped=0" >> $GITHUB_OUTPUT
          echo "passed=0" >> $GITHUB_OUTPUT
          echo "time=0" >> $GITHUB_OUTPUT
          echo "coverage=0" >> $GITHUB_OUTPUT

          echo "Checking for pytest-results.xml..."
          if [ -f "pytest-results.xml" ]; then
            echo "Found pytest-results.xml, processing..."
            RESULTS=$(python3 -c "
              import xml.etree.ElementTree as ET
              tree = ET.parse('pytest-results.xml')
              root = tree.getroot()
              tests = int(root.attrib['tests'])
              failures = int(root.attrib['failures'])
              errors = int(root.attrib['errors'])
              skipped = int(root.attrib['skipped'])
              time = float(root.attrib['time'])
              passed = tests - failures - errors - skipped
              print(f'{tests},{failures},{errors},{skipped},{passed},{time}')")
            echo "Raw results: ${RESULTS}"
            IFS=',' read -r tests failures errors skipped passed time <<< "${RESULTS}"
            echo "tests=${tests}" >> $GITHUB_OUTPUT
            echo "failures=${failures}" >> $GITHUB_OUTPUT
            echo "errors=${errors}" >> $GITHUB_OUTPUT
            echo "skipped=${skipped}" >> $GITHUB_OUTPUT
            echo "passed=${passed}" >> $GITHUB_OUTPUT
            echo "time=${time}" >> $GITHUB_OUTPUT
          else
            echo "pytest-results.xml not found!"
          fi

          echo "Checking for coverage.xml..."
          if [ -f "coverage.xml" ]; then
            echo "Found coverage.xml, processing..."
            COVERAGE=$(python3 -c "
              import xml.etree.ElementTree as ET
              tree = ET.parse('coverage.xml')
              root = tree.getroot()
              coverage = round(float(root.attrib['line-rate']) * 100, 2)
              print(coverage)")
            echo "Coverage value: ${COVERAGE}"
            echo "coverage=${COVERAGE}" >> $GITHUB_OUTPUT
          else
            echo "coverage.xml not found!"
          fi

      - name: Get PR Number
        if: always()
        id: pr
        run: |
          PR_NUMBER=$(gh api /repos/${{ github.repository }}/pulls \
            --jq ".[] | select(.head.sha == \"${{ github.sha }}\") | .number")
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find Comment
        if: always() && steps.pr.outputs.number
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          comment-author: 'github-actions[bot]'
          body-includes: Test Results Summary

      - name: Create or Update Comment
        if: always() && steps.pr.outputs.number
        uses: peter-evans/create-or-update-comment@v3
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ steps.pr.outputs.number }}
          body: |
            ### Test Results Summary 📊
            
            #### Coverage Report
            - Total Coverage: ${{ steps.test-results.outputs.coverage }}%
            
            #### Test Statistics
            - Total Tests: ${{ steps.test-results.outputs.tests }}
            - ✅ Passed: ${{ steps.test-results.outputs.passed }}
            - ❌ Failed: ${{ steps.test-results.outputs.failures }}
            - 🔴 Errors: ${{ steps.test-results.outputs.errors }}
            - ⏭️ Skipped: ${{ steps.test-results.outputs.skipped }}
            - ⏱️ Duration: ${{ steps.test-results.outputs.time }}s
            
            > Results from test run at ${{ github.event.head_commit.timestamp }}
          edit-mode: replace

      - name: Publish Test Results
        if: always() && steps.test-results.outputs.tests != '0'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: pytest-results.xml
          comment_mode: always
          compare_to_earlier_commit: true
          report_individual_runs: true
          test_changes_limit: 0
          check_name: "Pytest Results"