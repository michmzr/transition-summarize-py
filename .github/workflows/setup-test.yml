name: Setup and Test

on:
  workflow_call:
    secrets:
      JWT_SECRET_KEY:
        required: true
      OPENAI_API_KEY:
        required: true
      PROXY_SERVERS:
        required: true

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  setup_and_test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Install pipenv
        run: |
          python -m pip install --upgrade pip
          pip install pipenv

      - name: Cache pipenv virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.local/share/virtualenvs
          key: ${{ runner.os }}-pipenv-${{ hashFiles('**/Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pipenv-

      - name: Install dependencies and run tests
        id: test-run
        env:
          PYTHONPATH: ${{ github.workspace }}

          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

          USE_PROXY: false

          SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

          IS_LOCAL: true
          DISABLE_CACHE: true

          ENABLE_REGISTRATION: true
          LANGCHAIN_TRACING_V2: false
          LANGCHAIN_ENDPOINT: ""
          LANGCHAIN_PROJECT: ""
          LANGCHAIN_API_KEY: ""

          # Test environment indicator
          TESTING: true

          # Let testcontainers handle all database configuration
          POSTGRES_HOST: ""  # Will be set by testcontainers
          POSTGRES_PORT: ""  # Will be set by testcontainers
          POSTGRES_USER: ""  # Will be set by testcontainers
          POSTGRES_PASSWORD: ""  # Will be set by testcontainers
          POSTGRES_DB: ""  # Will be set by testcontainers
        run: |
          echo "Installing dependencies..."
          pipenv --python ${{ env.pythonLocation }}/bin/python install
          pipenv install pytest-asyncio pytest-cov pytest-html pytest-sugar

          echo "Running tests..."
          PYTHONPATH=$PWD pipenv run pytest \
            --verbose -v \
            -s \
            -m "unit or integration_no_yt" \
            --junitxml=pytest-results.xml \
            --cov=app \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml

          echo "Test files generated:"
          ls -la pytest-results.xml || echo "pytest-results.xml not found"
          ls -la coverage.xml || echo "coverage.xml not found"
          
          echo "Content of pytest-results.xml:"
          cat pytest-results.xml || echo "Cannot read pytest-results.xml"
          
          echo "Content of coverage.xml:"
          cat coverage.xml || echo "Cannot read coverage.xml"

      - name: Process Test Results
        if: always()
        id: test-results
        run: |
          echo "Starting test results processing..."
          
          # Initialize default values
          echo "tests=0" >> $GITHUB_OUTPUT
          echo "failures=0" >> $GITHUB_OUTPUT
          echo "errors=0" >> $GITHUB_OUTPUT
          echo "skipped=0" >> $GITHUB_OUTPUT
          echo "passed=0" >> $GITHUB_OUTPUT
          echo "time=0" >> $GITHUB_OUTPUT
          echo "coverage=0" >> $GITHUB_OUTPUT

          echo "Checking for pytest-results.xml..."
          if [ -f "pytest-results.xml" ]; then
            echo "Found pytest-results.xml, processing..."
            RESULTS=$(python3 scripts/process_pytest_results.py pytest-results.xml)
            echo "Raw results: ${RESULTS}"
            IFS=',' read -r tests failures errors skipped passed time <<< "${RESULTS}"
            echo "tests=${tests}" >> $GITHUB_OUTPUT
            echo "failures=${failures}" >> $GITHUB_OUTPUT
            echo "errors=${errors}" >> $GITHUB_OUTPUT
            echo "skipped=${skipped}" >> $GITHUB_OUTPUT
            echo "passed=${passed}" >> $GITHUB_OUTPUT
            echo "time=${time}" >> $GITHUB_OUTPUT
          else
            echo "pytest-results.xml not found!"
          fi

          echo "Checking for coverage.xml..."
          if [ -f "coverage.xml" ]; then
            echo "Found coverage.xml, processing..."
            COVERAGE=$(python3 scripts/process_coverage.py coverage.xml)
            echo "Coverage value: ${COVERAGE}"
            echo "coverage=${COVERAGE}" >> $GITHUB_OUTPUT
          else
            echo "coverage.xml not found!"
          fi

      - name: Get PR Number
        if: always()
        id: pr
        run: |
          PR_NUMBER=$(gh api /repos/${{ github.repository }}/pulls \
            --jq ".[] | select(.head.sha == \"${{ github.sha }}\") | .number")
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find Comment
        if: always() && steps.pr.outputs.number
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          comment-author: 'github-actions[bot]'
          body-includes: Test Results Summary

      - name: Create or Update Comment
        if: always() && steps.pr.outputs.number
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ steps.pr.outputs.number }}
          body: |
            ### Test Results Summary 📊
            
            #### Coverage Report
            - Total Coverage: ${{ steps.test-results.outputs.coverage }}%
            
            #### Test Statistics
            - Total Tests: ${{ steps.test-results.outputs.tests }}
            - ✅ Passed: ${{ steps.test-results.outputs.passed }}
            - ❌ Failed: ${{ steps.test-results.outputs.failures }}
            - 🔴 Errors: ${{ steps.test-results.outputs.errors }}
            - ⏭️ Skipped: ${{ steps.test-results.outputs.skipped }}
            - ⏱️ Duration: ${{ steps.test-results.outputs.time }}s
            
            > Results from test run at ${{ github.event.head_commit.timestamp }}
          edit-mode: replace

      - name: Publish Test Results
        if: always() && steps.test-results.outputs.tests != '0'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: pytest-results.xml
          comment_mode: always
          compare_to_earlier_commit: true
          report_individual_runs: true
          test_changes_limit: 0
          check_name: "Pytest Results"