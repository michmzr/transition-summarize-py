name: Setup and Test

on:
  workflow_call:
    secrets:
      JWT_SECRET_KEY:
        required: true
      OPENAI_API_KEY:
        required: true
      PROXY_SERVERS:
        required: true

permissions:
  checks: write
  pull-requests: write
  contents: read
  pages: write
  id-token: write

jobs:
  setup_and_test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pipenv
        run: |
          python -m pip install --upgrade pip
          pip install pipenv

      - name: Cache pipenv virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.local/share/virtualenvs
          key: ${{ runner.os }}-pipenv-${{ hashFiles('**/Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pipenv-

      - name: Unit & integrational testing
        id: test-run
        run: |
          pipenv install pytest-asyncio pytest-cov pytest-html pytest-sugar
          PYTHONPATH=$PWD pipenv run pytest \
            --verbose -v \
            --junitxml=pytest-results.xml \
            --html=pytest-report.html \
            --self-contained-html \
            --cov=app \
            --cov-report=html \
            --cov-report=xml
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: test_db
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROXY_SERVERS: ${{ secrets.PROXY_SERVERS }}
          SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          IS_LOCAL: true
          ENABLE_REGISTRATION: true
          LANGCHAIN_TRACING_V2: false
          LANGCHAIN_ENDPOINT: ""
          LANGCHAIN_PROJECT: ""
          LANGCHAIN_API_KEY: ""

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: pytest-results.xml
          comment_mode: always
          compare_to_earlier_commit: true
          report_individual_runs: true
          test_changes_limit: 0
          check_name: "Pytest Results"

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v4

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            pytest-report.html
            htmlcov/

      - name: Deploy Report to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Get PR Number
        if: always()
        id: pr
        run: |
          PR_NUMBER=$(gh api /repos/${{ github.repository }}/pulls \
            --jq ".[] | select(.head.sha == \"${{ github.sha }}\") | .number")
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find Comment
        if: always() && steps.pr.outputs.number
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          comment-author: 'github-actions[bot]'
          body-includes: Test Report Links

      - name: Create or Update Comment
        if: always() && steps.pr.outputs.number
        uses: peter-evans/create-or-update-comment@v3
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ steps.pr.outputs.number }}
          body: |
            ### Test Report Links 📊
            
            - [Detailed HTML Test Report](${{ steps.deployment.outputs.page_url }}/pytest-report.html)
            - [Coverage Report](${{ steps.deployment.outputs.page_url }}/htmlcov/index.html)
            
            > These reports are updated automatically with each test run.
          edit-mode: replace