name: Test Results

on:
  workflow_run:
    workflows: ["Feature", "Master"]
    types:
      - completed

permissions:
  checks: write
  pull-requests: write
  contents: read
  pages: write
  id-token: write

jobs:
  test-results:
    name: Process Test Results
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion != 'skipped'

    steps:
      - name: Download artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: ${{ github.event.workflow.id }}
          run_id: ${{ github.event.workflow_run.id }}
          name: pytest-results
          path: test-results

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "test-results/pytest-results.xml"
          comment_mode: always
          compare_to_earlier_commit: true
          report_individual_runs: true
          test_changes_limit: 0
          check_name: "Pytest Results"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload HTML Report
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            pytest-report.html
            htmlcov/

      - name: Deploy Report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Find Comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: Test Report Links

      - name: Create or Update Comment
        uses: peter-evans/create-or-update-comment@v3
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### Test Report Links 📊
            
            - [Detailed HTML Test Report](${{ steps.deployment.outputs.page_url }}/pytest-report.html)
            - [Coverage Report](${{ steps.deployment.outputs.page_url }}/htmlcov/index.html)
            
            > These reports are updated automatically with each test run.
          edit-mode: replace