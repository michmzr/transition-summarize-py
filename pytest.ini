[pytest]
log_format = %(asctime)s %(levelname)s %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
minversion = 7.0
addopts = -v --asyncio-mode=auto
testpaths = tests
python_paths = .
markers =
    unit: unit tests
    integration_no_yt: integration tests without youtube
    asyncio: mark test as an async test